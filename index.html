<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Diwali — Infinite Fireworks :sparkles:</title>
  <style>
    html,body{height:100%;margin:0}
    body{background:#070617;overflow:hidden;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;}
    canvas{display:block;position:fixed;inset:0}
    .hud{
      position:fixed;left:16px;top:16px;color:#fff;z-index:10;backdrop-filter:blur(6px);
      background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border-radius:12px;padding:10px 12px;font-size:13px;box-shadow:0 6px 20px rgba(2,6,23,0.6);
    }
    .hud b{display:inline-block;margin-right:8px}
    .credits{position:fixed;right:16px;bottom:16px;color:#fff;opacity:0.7;font-size:12px}
    .message{
      position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
      color:#fff;font-size:32px;font-weight:bold;text-align:center;
      text-shadow:0 0 15px rgba(255,255,255,0.8),0 0 30px #ff0,0 0 60px #f0f;
      z-index:5;animation:glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow{
      from{text-shadow:0 0 10px #fff,0 0 20px #ff0,0 0 30px #f0f;}
      to{text-shadow:0 0 20px #fff,0 0 40px #ff0,0 0 80px #f0f;}
    }
    .btn{display:inline-block;padding:6px 8px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.04);cursor:pointer;margin-left:6px}
    .small{font-size:12px;padding:4px 6px}
    @media (max-width:420px){.hud{font-size:12px;padding:8px;border-radius:10px}.message{font-size:22px}}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="message">Wish you a very Happy Diwali <br/> </br> - Adarsh & Kavya</div>
  <div class="hud" id="hud">
    <div>
    
      <span id="status"></span>
    </div>
    <div style="margin-top:6px;font-size:12px;opacity:0.9">
      <button id="toggleBtn" class="btn small"></button>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W = canvas.width = innerWidth;
    let H = canvas.height = innerHeight;
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(DPR, DPR);

    window.addEventListener('resize', ()=>{
      W = canvas.width = innerWidth;
      H = canvas.height = innerHeight;
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.scale(DPR, DPR);
    });

    function rand(min, max){ return Math.random() * (max - min) + min }
    function clamp(v, a, b){ return Math.max(a, Math.min(b, v)) }

    class Rocket {
      constructor(x, y, vx, vy, hue){
        this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.hue = hue;
        this.age = 0; this.exploded = false; this.size = 2 + Math.random()*1.8;
      }
      update(dt){
        this.vy += 0.04 * dt;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.age += dt;
        if((this.vy > -0.2 && Math.random() < 0.004*dt) || this.age > 60 + Math.random()*40 || this.y < H*0.25) {
          this.exploded = true;
          createExplosion(this.x, this.y, this.hue);
        }
      }
      draw(ctx){
        ctx.save();
        ctx.beginPath();
        ctx.fillStyle = `hsl(${this.hue} 100% 60%)`;
        ctx.globalCompositeOperation = 'lighter';
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
    }

    class Particle {
      constructor(x,y,vx,vy,hue,life){
        this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.hue = hue;
        this.life = life; this.maxLife = life; this.size = 1 + Math.random()*1.8;
        this.trail = [];
        this.trailLength = 8;
        this.alpha = 1;
      }
      update(dt){
        this.vy += 0.03 * dt;
        this.vx *= 0.999;
        this.vy *= 0.999;
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt;
        this.alpha = clamp(this.life / this.maxLife, 0, 1);
        this.trail.push({x:this.x,y:this.y});
        if(this.trail.length>this.trailLength) this.trail.shift();
      }
      draw(ctx){
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        const g = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,20);
        g.addColorStop(0, `hsla(${this.hue} 100% 60% / ${this.alpha})`);
        g.addColorStop(1, `hsla(${this.hue} 100% 40% / 0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size*2.4,0,Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.fillStyle = `hsla(${this.hue} 100% 60% / ${this.alpha})`;
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
        if(this.trail.length>1){
          ctx.beginPath();
          ctx.moveTo(this.trail[0].x, this.trail[0].y);
          for(let i=1;i<this.trail.length;i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
          ctx.strokeStyle = `hsla(${this.hue} 100% 60% / ${this.alpha*0.6})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    const rockets = [];
    const particles = [];
    let autoLaunch = true;
    let launchRate = 0.9;
    let lastLaunch = 0;
    const stars = Array.from({length: Math.floor((W*H)/90000)}, ()=>({x: rand(0,W), y: rand(0,H*0.6), r: Math.random()*1.2, a: rand(0.1,0.9)}));

    function createRocket(x,y){
      const vx = rand(-1.2,1.2);
      const vy = rand(-5.8,-7.6);
      const hue = Math.floor(rand(0,360));
      rockets.push(new Rocket(x,y,vx,vy,hue));
    }

    function createExplosion(x,y,hue){
      const count = Math.floor(rand(40,140));
      const spread = rand(2.4,6.6);
      for(let i=0;i<count;i++){
        const angle = Math.PI*2 * Math.random();
        const speed = rand(1.2, spread);
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;
        const life = rand(30, 80);
        particles.push(new Particle(x,y,vx,vy,hue + rand(-20,20), life));
      }
      if(Math.random() < 0.25){
        for(let s=0;s<3;s++){
          setTimeout(()=>{createExplosion(x + rand(-10,10), y + rand(-10,10), hue + rand(-40,40));}, rand(120, 450));
        }
      }
    }

    function autoTick(dt){
      if(!autoLaunch) return;
      lastLaunch += dt/60;
      const interval = Math.max(0.1, 1/launchRate);
      if(lastLaunch > interval){
        lastLaunch = 0;
        const x = rand(W*0.1, W*0.9);
        const y = H + 10;
        createRocket(x, y);
      }
    }

    function pointerLaunch(x,y){
      const startX = x + rand(-40,40);
      const startY = H + 6;
      const vx = (x - startX) * 0.03 + rand(-0.6,0.6);
      const vy = -7.8 - Math.abs((H - y)/H)*2.5 + rand(-0.8,0.8);
      const hue = Math.floor(rand(0,360));
      rockets.push(new Rocket(startX, startY, vx, vy, hue));
    }

    let last = performance.now();
    function loop(now){
      const dt = Math.min(2, (now - last) / (1000/60));
      last = now;
      ctx.fillStyle = 'rgba(5,6,20,0.25)';
      ctx.fillRect(0,0,W,H);
      ctx.save();
      for(const s of stars){
        ctx.globalAlpha = s.a * (0.6 + 0.4*Math.sin(now/2000 + s.x));
        ctx.beginPath();
        ctx.fillStyle = '#fff';
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
      for(let i=rockets.length-1;i>=0;i--){
        const r = rockets[i];
        r.update(dt);
        r.draw(ctx);
        if(r.exploded) rockets.splice(i,1);
      }
      for(let i=particles.length-1;i>=0;i--){
        const p = particles[i];
        p.update(dt);
        p.draw(ctx);
        if(p.life <= 0) particles.splice(i,1);
      }
      if(particles.length > 4000){ particles.splice(0, particles.length-3500); }
      autoTick(dt);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    let pointerDown = false;
    canvas.addEventListener('pointerdown', (e)=>{ pointerDown = true; pointerLaunch(e.clientX, e.clientY); });
    canvas.addEventListener('pointermove', (e)=>{ if(pointerDown && Math.random() < 0.3) pointerLaunch(e.clientX, e.clientY); });
    canvas.addEventListener('pointerup', ()=>{ pointerDown = false });

    window.addEventListener('keydown', (e)=>{
      if(e.code === 'Space'){ toggleAuto(); e.preventDefault(); }
      if(e.key === 'c' || e.key === 'C'){ particles.length = 0; rockets.length = 0; }
      if(e.key === 'ArrowUp'){ launchRate = clamp(launchRate + 0.2, 0.2, 6); }
      if(e.key === 'ArrowDown'){ launchRate = clamp(launchRate - 0.2, 0.2, 6); }
      updateHud();
    });

    document.getElementById('toggleBtn').addEventListener('click', toggleAuto);
    function toggleAuto(){ autoLaunch = !autoLaunch; updateHud(); }
    function updateHud(){ document.getElementById('status').textContent = ` `}
    for(let i=0;i<6;i++){ setTimeout(()=>{ createRocket(rand(W*0.2,W*0.8), H+10); }, i*400); }
    setInterval(updateHud, 300);
    window.fireworks = { createRocket, createExplosion };
  </script></body>
</html>
